function wizDeathStr(y,m,dd){if(!y)return'';const pv=parseYearVal(y);if(!pv.y)return'';const es=pv.era?pv.era:warekiYear(pv.y).replace('年','');return es+'年'+(m?m+'月':'')+(dd?dd+'日':'');}
function wizToggleSC(id){const sc=wiz.data.specialCircumstances;const i=sc.indexOf(id);if(i>=0)sc.splice(i,1);else sc.push(id);wizRender();}
function wizHasAnyChildren(){const d=wiz.data;return d.hasChildren||d.exChildren.length>0||d.adoptees.length>0;}
function wizAfterSpecial(){const d=wiz.data;if(d.specialCircumstances.includes('ex'))wiz.step='ex_spouse_status';else if(d.specialCircumstances.includes('adoptee'))wiz.step='adoptee_count';else if(!d.hasChildren)wiz.step='parents';else wiz.step='confirm';}
function wizAfterEx(){const d=wiz.data;if(d.specialCircumstances.includes('adoptee'))wiz.step='adoptee_count';else if(!wizHasAnyChildren())wiz.step='parents';else wiz.step='confirm';}

function wizSaveChildInput(){
  const ci=wiz.childIdx,c=wiz.data.children[ci];
  const nameEl=document.getElementById('wizCName');
  const relEl=document.getElementById('wizCRel');
  if(nameEl)c.name=nameEl.value.trim();
  if(relEl)c.relation=relEl.value;
}
function wizSaveSibInput(){
  const si=wiz.sibIdx,sb=wiz.data.siblings[si];
  const nameEl=document.getElementById('wizSibName');
  if(nameEl)sb.name=nameEl.value.trim();
}
function wizHighlight(id){const el=document.getElementById(id);if(el){el.style.borderColor='#e74c3c';el.focus();el.addEventListener('input',function h(){el.style.borderColor='';el.removeEventListener('input',h);},{once:true});}}
function wizSaveSpouseName(){
  if(wiz.data.spouse){
    const el=document.getElementById('wizSpName');
    if(el)wiz.data.spouse.name=el.value.trim();
  }
}

function wizNext(action,val){
  const d=wiz.data;
  wizPush();
  switch(action){
    case 'name':
      d.name=(document.getElementById('wizIn').value||'').trim();
      if(!d.name){wiz.history.pop();return;}
      wiz.step='death';break;
    case 'death':
      d.deathY=document.getElementById('wizDY').value;d.deathM=document.getElementById('wizDM').value;d.deathD=document.getElementById('wizDD').value;
      wiz.step='spouse';break;
    case 'spouse_yes':d.spouse={alive:true,name:'',deathY:'',deathM:'',deathD:''};wiz.step='spouse_status';break;
    case 'spouse_no':d.spouse=null;wiz.step='children';break;
    case 'spouse_alive':wizSaveSpouseName();if(!d.spouse.name){wiz.history.pop();wizHighlight('wizSpName');return;}d.spouse.alive=true;wiz.step='children';break;
    case 'spouse_dead':wizSaveSpouseName();if(!d.spouse.name){wiz.history.pop();wizHighlight('wizSpName');return;}d.spouse.alive=false;wiz.step='spouse_death';break;
    case 'spouse_death_done':
      d.spouse.deathY=document.getElementById('wizSDY').value;d.spouse.deathM=document.getElementById('wizSDM').value;d.spouse.deathD=document.getElementById('wizSDD').value;
      wiz.step='children';break;
    case 'children_yes':d.hasChildren=true;wiz.step='child_count';break;
    case 'children_no':d.hasChildren=false;wiz.step='special';break;
    case 'child_n':
      d.children=Array.from({length:val},()=>({alive:true,waived:false,name:'',relation:'',roleOverride:'',grandchildren:[],suujiSpouse:null,suujiChildren:[]}));
      wiz.childIdx=0;wiz.step='child_detail';break;
    case 'child_alive':wizSaveChildInput();if(!d.children[wiz.childIdx].name){wiz.history.pop();wizHighlight('wizCName');return;}d.children[wiz.childIdx].alive=true;wizChildNext();return;
    case 'child_dead':wizSaveChildInput();if(!d.children[wiz.childIdx].name){wiz.history.pop();wizHighlight('wizCName');return;}d.children[wiz.childIdx].alive=false;wiz.step='child_before_after';break;
    case 'child_waived':wizSaveChildInput();if(!d.children[wiz.childIdx].name){wiz.history.pop();wizHighlight('wizCName');return;}d.children[wiz.childIdx].waived=true;wizChildNext();return;
    case 'child_before':d.children[wiz.childIdx].roleOverride='先死亡';wiz.step='child_has_gc';break;
    case 'child_after':d.children[wiz.childIdx].roleOverride='相続後死亡';wiz.step='child_suuji_spouse';break;
    case 'child_has_gc_yes':wiz.step='child_gc_count';break;
    case 'child_has_gc_no':wizChildNext();return;
    case 'child_gc_count':break;
    case 'child_gc_n':d.children[wiz.childIdx].grandchildren=Array.from({length:val},()=>({name:''}));wiz.step='child_gc_names';break;
    case 'child_gc_names_done':{
      const gcs=d.children[wiz.childIdx].grandchildren;
      gcs.forEach((g,j)=>{const el=document.getElementById('wizGC'+j);if(el)g.name=el.value.trim();});
      const emptyGC=gcs.findIndex(g=>!g.name);if(emptyGC>=0){wiz.history.pop();wizHighlight('wizGC'+emptyGC);return;}
      wizChildNext();return;}
    case 'suuji_spouse_yes':d.children[wiz.childIdx].suujiSpouse={exists:true,name:''};wiz.step='child_suuji_spouse_name';break;
    case 'suuji_spouse_name_done':{const el=document.getElementById('wizSuujiSpName');const ss=d.children[wiz.childIdx].suujiSpouse;if(el)ss.name=el.value.trim();if(!ss.name){wiz.history.pop();wizHighlight('wizSuujiSpName');return;}wiz.step='child_suuji_children';break;}
    case 'suuji_spouse_no':d.children[wiz.childIdx].suujiSpouse=null;wiz.step='child_suuji_children';break;
    case 'suuji_children_yes':wiz.step='child_suuji_child_count';break;
    case 'suuji_children_no':wizChildNext();return;
    case 'suuji_child_count':break;
    case 'suuji_child_n':d.children[wiz.childIdx].suujiChildren=Array.from({length:val},()=>({name:''}));wiz.step='child_suuji_child_names';break;
    case 'suuji_child_names_done':{
      const scs=d.children[wiz.childIdx].suujiChildren;
      scs.forEach((c,j)=>{const el=document.getElementById('wizSC'+j);if(el)c.name=el.value.trim();});
      const emptySC=scs.findIndex(c=>!c.name);if(emptySC>=0){wiz.history.pop();wizHighlight('wizSC'+emptySC);return;}
      wizChildNext();return;}
    case 'special_done':wizAfterSpecial();break;
    case 'ex_spouse_alive':d.exSpouse={alive:true,name:''};wiz.step='ex_spouse_name';break;
    case 'ex_spouse_dead':d.exSpouse={alive:false,name:''};wiz.step='ex_spouse_name';break;
    case 'ex_spouse_name_done':{const el=document.getElementById('wizExSpName');if(el)d.exSpouse.name=el.value.trim();if(!d.exSpouse.name){wiz.history.pop();wizHighlight('wizExSpName');return;}wiz.step='ex_count';break;}
    case 'ex_spouse_skip':d.exSpouse=null;wiz.step='ex_count';break;
    case 'ex_n':d.exChildren=Array.from({length:val},()=>({name:''}));wiz.step='ex_names';break;
    case 'ex_names_done':
      d.exChildren.forEach((c,j)=>{const el=document.getElementById('wizEX'+j);if(el)c.name=el.value.trim();});
      {const emptyEX=d.exChildren.findIndex(c=>!c.name);if(emptyEX>=0){wiz.history.pop();wizHighlight('wizEX'+emptyEX);return;}}
      wizAfterEx();break;
    case 'adoptee_n':d.adoptees=Array.from({length:val},()=>({name:''}));wiz.step='adoptee_names';break;
    case 'adoptee_names_done':
      d.adoptees.forEach((c,j)=>{const el=document.getElementById('wizAD'+j);if(el)c.name=el.value.trim();});
      {const emptyAD=d.adoptees.findIndex(c=>!c.name);if(emptyAD>=0){wiz.history.pop();wizHighlight('wizAD'+emptyAD);return;}}
      if(!wizHasAnyChildren())wiz.step='parents';else wiz.step='confirm';break;
    case 'parents_both':d.parents=[{rel:'父',alive:true,name:''},{rel:'母',alive:true,name:''}];wiz.step='parent_names';break;
    case 'parents_father':d.parents=[{rel:'父',alive:true,name:''},{rel:'母',alive:false,name:''}];wiz.step='parent_names';break;
    case 'parents_mother':d.parents=[{rel:'父',alive:false,name:''},{rel:'母',alive:true,name:''}];wiz.step='parent_names';break;
    case 'parents_none':d.parents=[{rel:'父',alive:false,name:''},{rel:'母',alive:false,name:''}];wiz.step='parent_names';break;
    case 'parent_names_done':
      d.parents.forEach((p,j)=>{const el=document.getElementById('wizPar'+j);if(el)p.name=el.value.trim();});
      {const emptyPar=d.parents.findIndex(p=>!p.name);if(emptyPar>=0){wiz.history.pop();wizHighlight('wizPar'+emptyPar);return;}}
      if(d.parents.every(p=>!p.alive))wiz.step='siblings';else wiz.step='confirm';break;
    case 'siblings_yes':wiz.step='sibling_count';break;
    case 'siblings_no':wiz.step='confirm';break;
    case 'sib_n':
      d.siblings=Array.from({length:val},()=>({alive:true,name:'',roleOverride:'',nephews:[]}));
      wiz.sibIdx=0;wiz.step='sib_detail';break;
    case 'sib_alive':wizSaveSibInput();if(!d.siblings[wiz.sibIdx].name){wiz.history.pop();wizHighlight('wizSibName');return;}d.siblings[wiz.sibIdx].alive=true;wizSibNext();return;
    case 'sib_dead':wizSaveSibInput();if(!d.siblings[wiz.sibIdx].name){wiz.history.pop();wizHighlight('wizSibName');return;}d.siblings[wiz.sibIdx].alive=false;wiz.step='sib_before_after';break;
    case 'sib_before':d.siblings[wiz.sibIdx].roleOverride='先死亡';wiz.step='sib_has_nephew';break;
    case 'sib_after':d.siblings[wiz.sibIdx].roleOverride='相続後死亡';wizSibNext();return;
    case 'sib_has_nephew_yes':wiz.step='sib_nephew_count';break;
    case 'sib_has_nephew_no':wizSibNext();return;
    case 'sib_nephew_count':break;
    case 'sib_nephew_n':d.siblings[wiz.sibIdx].nephews=Array.from({length:val},()=>({name:''}));wiz.step='sib_nephew_names';break;
    case 'sib_nephew_names_done':{
      const nps=d.siblings[wiz.sibIdx].nephews;
      nps.forEach((n,j)=>{const el=document.getElementById('wizNP'+j);if(el)n.name=el.value.trim();});
      const emptyNP=nps.findIndex(n=>!n.name);if(emptyNP>=0){wiz.history.pop();wizHighlight('wizNP'+emptyNP);return;}
      wizSibNext();return;}
  }
  wizRender();
}

// gc/nephew/suuji count steps (need to render inline since they go to name steps)
(function(){
  const origRender=wizRender;
  wizRender=function(){
    origRender();
    const bd=document.getElementById('wizBody');
    if(wiz.step==='child_gc_count'){
      bd.innerHTML='<span class="wiz-tag wiz-tag-blue">子 '+(wiz.childIdx+1)+' → 代襲</span><div class="wiz-q">お孫さん（代襲相続人）は何人ですか？</div><div class="wiz-btns">'+[1,2,3,4].map(n=>'<button class="wiz-btn" onclick="wizNext(\'child_gc_n\','+n+')">'+n+'人</button>').join('')+'</div>';
    }
    if(wiz.step==='child_suuji_child_count'){
      bd.innerHTML='<span class="wiz-tag wiz-tag-blue">子 '+(wiz.childIdx+1)+' → 数次相続</span><div class="wiz-q">お孫さん（数次相続の当事者）は何人ですか？</div><div class="wiz-btns">'+[1,2,3,4].map(n=>'<button class="wiz-btn" onclick="wizNext(\'suuji_child_n\','+n+')">'+n+'人</button>').join('')+'</div>';
    }
    if(wiz.step==='sib_nephew_count'){
      bd.innerHTML='<span class="wiz-tag wiz-tag-blue">兄弟姉妹 '+(wiz.sibIdx+1)+' → 代襲</span><div class="wiz-q">甥・姪（代襲相続人）は何人ですか？</div><div class="wiz-btns">'+[1,2,3,4].map(n=>'<button class="wiz-btn" onclick="wizNext(\'sib_nephew_n\','+n+')">'+n+'人</button>').join('')+'</div>';
    }
  };
})();

function getClientUrl(){
  const u=new URL(location.href);u.search='?client';
  return u.toString();
}
function openShareClient(){
  let ov=document.getElementById('shareOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='shareOverlay';ov.className='import-overlay';
    ov.innerHTML='<div class="share-box"><h3>📤 お客様に入力用リンクを送る</h3><p>下のURLをコピーして、お客様にお送りください。<br>お客様がリンクを開くと入力画面が表示されます。</p><div class="share-url-row"><input id="shareUrlInput" readonly><button onclick="shareClipboard()">コピー</button></div><div style="margin-top:16px;text-align:right"><button class="wiz-btn" onclick="closeShareClient()">閉じる</button></div></div>';
    document.body.appendChild(ov);
  }
  const si=document.getElementById('shareUrlInput');si.value=getClientUrl();
  setTimeout(()=>{si.focus();si.select();},100);
  ov.classList.add('active');
}
function closeShareClient(){document.getElementById('shareOverlay').classList.remove('active');}
function shareClipboard(){
  const inp=document.getElementById('shareUrlInput');
  inp.focus();inp.select();inp.setSelectionRange(0,99999);
  const btn=document.querySelector('.share-url-row button');
  try{
    if(document.execCommand('copy')){btn.textContent='✓ コピー済';btn.style.background='#3d6e4f';setTimeout(()=>{btn.textContent='コピー';btn.style.background='';},2000);return;}
  }catch(e){}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(inp.value).then(()=>{btn.textContent='✓ コピー済';btn.style.background='#3d6e4f';setTimeout(()=>{btn.textContent='コピー';btn.style.background='';},2000);});
  }else{btn.textContent='Ctrl+C でコピーしてください';setTimeout(()=>{btn.textContent='コピー';},3000);}
}

function openLoadDialog(){
  let ov=document.getElementById('loadOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='loadOverlay';ov.className='import-overlay';
    ov.innerHTML='<div class="import-box"><h3>読み込み</h3><div class="wiz-multi" style="margin-bottom:16px"><button class="wiz-btn" onclick="doLoadFile()" style="padding:16px"><div style="font-weight:700">📁 ファイルから読込</div><div class="wiz-sub">保存したJSONファイルを選択</div></button><button class="wiz-btn" onclick="showCodeInput()" style="padding:16px"><div style="font-weight:700">📋 お客様コードを読込</div><div class="wiz-sub">お客様から受け取ったコードを貼り付け</div></button></div><div id="codeInputArea" style="display:none"><textarea class="wiz-code-area" id="importArea" placeholder="お客様から受け取ったコードを貼り付け..."></textarea><div class="wiz-btns"><button class="wiz-btn primary" onclick="doClientImport()">読み込む</button></div><div class="import-err" id="importErr">コードが正しくありません。お客様に再度お送りいただくようお伝えください。</div></div><div style="margin-top:12px;text-align:right"><button class="wiz-btn" onclick="closeLoadDialog()">キャンセル</button></div></div>';
    document.body.appendChild(ov);
  }
  document.getElementById('codeInputArea').style.display='none';
  document.getElementById('importErr').style.display='none';
  ov.classList.add('active');
}
function closeLoadDialog(){document.getElementById('loadOverlay').classList.remove('active');}
function doLoadFile(){closeLoadDialog();document.getElementById('fi').click();}
function showCodeInput(){document.getElementById('codeInputArea').style.display='block';setTimeout(()=>document.getElementById('importArea').focus(),50);}
function doClientImport(){
  const code=document.getElementById('importArea').value.trim();
  try{
    const json=decodeURIComponent(escape(atob(code)));
    const d=JSON.parse(json);
    if(!d.name)throw new Error('invalid');
    closeLoadDialog();openWizard();
    wiz.data=Object.assign(wizInitData(),d);
    wiz.step='confirm';wiz.history=[];wiz.forward=[];wiz.childIdx=0;wiz.sibIdx=0;
    wizRender();
  }catch(e){document.getElementById('importErr').style.display='block';}
}

function wizCopyCode(){
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(wiz.data))));
  const btn=document.getElementById('wizCopyBtn');
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='✓ コピーしました！担当者に貼り付けて送ってください';btn.classList.add('wiz-copied');
    setTimeout(()=>{btn.textContent='もう一度コピーする';btn.classList.remove('wiz-copied');},3000);
  }).catch(()=>{
    // フォールバック
    const t=document.createElement('textarea');t.value=code;t.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    btn.textContent='✓ コピーしました！担当者に貼り付けて送ってください';btn.classList.add('wiz-copied');
    setTimeout(()=>{btn.textContent='もう一度コピーする';btn.classList.remove('wiz-copied');},3000);
  });
}

function wizApply(){
  const d=wiz.data;
  P=[];uid=1;cardPositions={};cardPositionsV={};cardPositionsH={};footerPos=null;hdrPos=null;

  const bsz={id:uid++,name:d.name,relation:'',role:'被相続人',roleOverride:'',isBSZ:true,
    birthY:'',birthM:'',birthD:'',deathY:d.deathY,deathM:d.deathM,deathD:d.deathD,
    father:'',mother:'',spouse:'',exSpouses:[],address:''};
  P.push(bsz);

  let spouseId=null;
  if(d.spouse){
    const sp={id:uid++,name:d.spouse.name||'',relation:'妻',role:'',roleOverride:'',isBSZ:false,
      birthY:'',birthM:'',birthD:'',deathY:d.spouse.deathY||'',deathM:d.spouse.deathM||'',deathD:d.spouse.deathD||'',
      father:'',mother:'',spouse:String(bsz.id),exSpouses:[],address:''};
    P.push(sp);bsz.spouse=String(sp.id);spouseId=sp.id;
  }

  let exSpouseId=null;
  if(d.exSpouse){
    const ex={id:uid++,name:d.exSpouse.name||'',relation:'前妻',role:'',roleOverride:d.exSpouse.alive?'元配偶者':'死亡',isBSZ:false,
      birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
      father:'',mother:'',spouse:'',exSpouses:[],address:''};
    P.push(ex);exSpouseId=ex.id;bsz.exSpouses.push(String(ex.id));
  }

  d.children.forEach((c,i)=>{
    const rel=c.relation||CHILD_REL_M[i]||('子'+(i+1));
    const kid={id:uid++,name:c.name||'',relation:rel,role:'',roleOverride:c.waived?'遺産分割':(c.roleOverride||''),isBSZ:false,
      birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
      father:String(bsz.id),mother:spouseId?String(spouseId):'',spouse:'',exSpouses:[],address:''};
    P.push(kid);
    if(c.grandchildren&&c.grandchildren.length){
      c.grandchildren.forEach(g=>{
        P.push({id:uid++,name:g.name||'',relation:'孫',role:'',roleOverride:'',isBSZ:false,
          birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
          father:String(kid.id),mother:'',spouse:'',exSpouses:[],address:''});
      });
    }
    if(c.suujiSpouse&&c.suujiSpouse.exists){
      const suujiSp={id:uid++,name:c.suujiSpouse.name||'',relation:'妻',role:'',roleOverride:'',isBSZ:false,
        birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
        father:'',mother:'',spouse:String(kid.id),exSpouses:[],address:''};
      P.push(suujiSp);kid.spouse=String(suujiSp.id);
    }
    if(c.suujiChildren&&c.suujiChildren.length){
      c.suujiChildren.forEach(sc=>{
        P.push({id:uid++,name:sc.name||'',relation:'孫',role:'',roleOverride:'',isBSZ:false,
          birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
          father:String(kid.id),mother:kid.spouse||'',spouse:'',exSpouses:[],address:''});
      });
    }
  });

  d.exChildren.forEach(c=>{
    P.push({id:uid++,name:c.name||'',relation:'子',role:'',roleOverride:'',isBSZ:false,
      birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
      father:String(bsz.id),mother:exSpouseId?String(exSpouseId):'',spouse:'',exSpouses:[],address:''});
  });

  d.adoptees.forEach(c=>{
    P.push({id:uid++,name:c.name||'',relation:'養子',role:'',roleOverride:'',isBSZ:false,
      birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
      father:String(bsz.id),mother:spouseId?String(spouseId):'',spouse:'',exSpouses:[],address:''});
  });

  let fatherId=null,motherId=null;
  d.parents.forEach(p=>{
    const par={id:uid++,name:p.name||'',relation:p.rel,role:'',roleOverride:p.alive?'':'先死亡',isBSZ:false,
      birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
      father:'',mother:'',spouse:'',exSpouses:[],address:''};
    P.push(par);
    if(p.rel==='父'){bsz.father=String(par.id);fatherId=par.id;}
    if(p.rel==='母'){bsz.mother=String(par.id);motherId=par.id;}
  });
  if(fatherId&&motherId){
    const f=P.find(x=>x.id===fatherId),m=P.find(x=>x.id===motherId);
    if(f&&m){f.spouse=String(motherId);m.spouse=String(fatherId);}
  }

  d.siblings.forEach((sb,i)=>{
    const sib={id:uid++,name:sb.name||'',relation:i===0?'兄':'弟',role:'',roleOverride:sb.roleOverride||'',isBSZ:false,
      birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
      father:bsz.father||'',mother:bsz.mother||'',spouse:'',exSpouses:[],address:''};
    P.push(sib);
    if(sb.nephews&&sb.nephews.length){
      sb.nephews.forEach(n=>{
        P.push({id:uid++,name:n.name||'',relation:'甥',role:'',roleOverride:'',isBSZ:false,
          birthY:'',birthM:'',birthD:'',deathY:'',deathM:'',deathD:'',
          father:String(sib.id),mother:'',spouse:'',exSpouses:[],address:''});
      });
    }
  });

  document.getElementById('inHonseki').value=d.honseki||'';
  document.getElementById('inLastAddr').value=d.lastAddr||'';
  document.getElementById('inRegAddr').value=d.regAddr||'';
  autoRoles();renderList(0);draw();closeWizard();
}

const isClientMode=new URLSearchParams(location.search).has('client');
if(isClientMode){document.body.classList.add('client-mode');openWizard();}
</script>
