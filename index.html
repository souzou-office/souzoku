<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相続関係説明図</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Ink palette (warm black neutrals) */
  --ink-900:#14110e; --ink-800:#2a2620; --ink-700:#4a433b; --ink-600:#6e665b;
  --ink-500:#928878; --ink-400:#b5ac9c; --ink-300:#d5cdbd; --ink-200:#e8e1d2;
  --ink-150:#f0ead9; --ink-100:#f7f2e3; --ink-50:#fbf8ee;
  --paper:#fdfaf1; --white:#ffffff;
  /* Brand (sumi-navy + enji) */
  --brand-900:#1a2332; --brand-800:#253449; --brand-700:#334a66;
  --brand-600:#4a6585; --brand-500:#6b84a3;
  --accent:#8c2a2b; --accent-soft:#b85457;
  /* Role colors (desaturated, legal-document tone) */
  --role-bsz:#8c2a2b;    --role-bsz-bg:#f5e8e4;
  --role-heir:#3d6e4f;   --role-heir-bg:#e4ede3;
  --role-waiver:#a86b1f; --role-waiver-bg:#f4ead6;
  --role-pre:#786d5f;    --role-pre-bg:#ede8dd;
  --role-post:#583f6b;   --role-post-bg:#ebe3f0;
  --role-suuji:#2f5977;  --role-suuji-bg:#dde7ef;
  --role-both:#2a6860;   --role-both-bg:#dfece8;
  --role-none:#8c8478;   --role-none-bg:#eae4d8;
  /* Backwards-compat aliases (existing selectors) */
  --primary:var(--brand-700); --primary-l:var(--brand-600);
  --bg:var(--ink-50); --card:var(--white);
  --border:var(--ink-200); --txt:var(--ink-800); --txtL:var(--ink-600);
  --r:10px;
  --danger:#8c2a2b;
  --shadow-1:0 1px 2px rgba(20,17,14,.04),0 1px 3px rgba(20,17,14,.06);
  --shadow-2:0 2px 4px rgba(20,17,14,.05),0 4px 12px rgba(20,17,14,.08);
  --ff-ui:'Noto Sans JP','Hiragino Sans','Yu Gothic UI','Meiryo',system-ui,sans-serif;
  --ff-doc:'Shippori Mincho','Yu Mincho','MS Mincho','Hiragino Mincho ProN',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff-ui);background:var(--bg);color:var(--txt);font-size:13px;font-feature-settings:'palt' 1;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;font-size:13px}

.header{background:var(--ink-900);color:var(--ink-100);padding:0 16px;height:52px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #000;font-size:12.5px}
.header h1{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--ink-100)}
.hdr-btns .btn-undo,.hdr-btns .btn-redo{padding:0 10px!important;height:30px!important;font-size:14px!important;min-width:0;display:inline-flex;align-items:center;justify-content:center}
.hdr-btns .btn-undo{background:rgba(255,255,255,.06)!important;color:var(--ink-200)!important;font-weight:600;border:1px solid rgba(255,255,255,.14)!important}
.hdr-btns .btn-undo:hover{background:rgba(255,255,255,.12)!important;color:var(--ink-100)!important}
.hdr-btns .btn-redo{background:rgba(255,255,255,.06)!important;color:var(--ink-200)!important;font-weight:600;border:1px solid rgba(255,255,255,.14)!important}
.hdr-btns .btn-redo:hover{background:rgba(255,255,255,.12)!important;color:var(--ink-100)!important}
.hdr-sep{width:1px;height:22px;background:rgba(255,255,255,.1);margin:0 4px}
.hdr-btns{display:flex;gap:6px;align-items:center}
.hdr-btns button{height:30px;padding:0 12px;border:none;border-radius:6px;font-weight:500;font-size:12px;background:transparent;color:var(--ink-200);cursor:pointer;letter-spacing:.02em;transition:background .12s,color .12s;display:inline-flex;align-items:center;gap:6px}
.hdr-btns button:hover{background:rgba(255,255,255,.08);color:var(--ink-100)}

.wrap{display:flex;height:calc(100vh - 52px)}

.side{width:400px;min-width:400px;background:var(--white);border-right:1px solid var(--ink-200);display:flex;flex-direction:column}
.side-head{padding:16px 18px 14px;border-bottom:1px solid var(--ink-200);background:linear-gradient(180deg,var(--ink-50),var(--white))}
.side-head label{font-size:10.5px;color:var(--ink-600);font-weight:500;display:block;margin-bottom:3px;margin-top:10px;letter-spacing:.04em}
.side-head label:first-child{margin-top:0}
.side-head input{width:100%;height:30px;padding:0 10px;border:1px solid var(--ink-200);border-radius:6px;font-size:13px;margin-bottom:2px;color:var(--ink-800);background:var(--white);font-family:inherit}
.side-head input:focus{border-color:var(--brand-700);outline:none;box-shadow:0 0 0 3px rgba(51,74,102,.1)}

.plist{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}

.pc{position:relative;background:var(--white);border:1px solid var(--ink-200);border-radius:var(--r);overflow:hidden;transition:border-color .12s,box-shadow .12s}
.pc:hover{border-color:var(--ink-300)}
.pc.open{box-shadow:var(--shadow-1)}
.pc::before{content:"";position:absolute;top:0;bottom:0;left:0;width:3px;background:var(--ink-300)}
.pc.r-被相続人::before{background:var(--role-bsz)}
.pc.r-相続人::before{background:var(--role-heir)}
.pc.r-遺産分割::before{background:var(--role-waiver)}
.pc.r-先死亡::before{background:var(--role-pre)}
.pc.r-相続後死亡::before{background:var(--role-post)}
.pc.r-数次相続人::before{background:var(--role-suuji)}
.pc.r-無関係::before{background:var(--role-none)}
.pc.r-相続人兼数次相続人::before{background:var(--role-both)}

.pc-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 12px 10px 16px;cursor:pointer;user-select:none}
.pc-hd:hover{background:var(--ink-50)}
.pc.open .pc-hd{background:var(--ink-50)}
.pc-nm{font-weight:600;font-size:13.5px;color:var(--ink-900);letter-spacing:.01em}
.pc-sub{font-size:11px;color:var(--ink-600);margin-left:8px}
.pc-badge{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;margin-left:6px;letter-spacing:.04em}
.bg-被相続人{background:var(--role-bsz-bg);color:var(--role-bsz)}
.bg-相続人{background:var(--role-heir-bg);color:var(--role-heir)}
.bg-遺産分割{background:var(--role-waiver-bg);color:var(--role-waiver)}
.bg-先死亡{background:var(--role-pre-bg);color:var(--role-pre)}
.bg-相続後死亡{background:var(--role-post-bg);color:var(--role-post)}
.bg-数次相続人{background:var(--role-suuji-bg);color:var(--role-suuji)}
.bg-無関係{background:var(--role-none-bg);color:var(--role-none)}
.bg-相続人兼数次相続人{background:var(--role-both-bg);color:var(--role-both)}
.pc-tgl{font-size:16px;color:var(--ink-400);transition:transform .2s}
.pc.open .pc-tgl{transform:rotate(180deg)}

.pc-bd{display:none;border-top:1px solid var(--ink-200);background:var(--ink-50)}
.pc.open .pc-bd{display:block}

.tabs{display:flex;gap:2px;background:var(--white);border:1px solid var(--ink-200);border-radius:7px;padding:2px;margin:10px 12px 4px}
.tab{flex:1;height:26px;padding:0;text-align:center;font-size:11.5px;font-weight:500;color:var(--ink-600);border:none;background:transparent;border-radius:5px;letter-spacing:.02em;transition:all .15s}
.tab:hover{color:var(--ink-800)}
.tab.active{color:var(--ink-900);background:var(--ink-100);font-weight:600}
.tab-body{padding:10px 12px 12px}
.tab-pane{display:none}
.tab-pane.active{display:block}

.fg{margin-bottom:6px}
.fg label{font-size:10.5px;color:var(--ink-600);font-weight:500;display:block;margin-bottom:3px;letter-spacing:.02em}
.fg input,.fg select{width:100%;height:30px;padding:0 10px;border:1px solid var(--ink-200);border-radius:6px;font-size:12px;background:var(--white);color:var(--ink-800);font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--brand-700);outline:none;box-shadow:0 0 0 3px rgba(51,74,102,.1)}
.fg-row{display:flex;gap:8px}
.fg-row .fg{flex:1}

.date-row{display:flex;gap:4px;align-items:center}
.date-row select{height:30px;padding:0 6px;font-size:12px;border:1px solid var(--ink-200);border-radius:6px;background:var(--white);color:var(--ink-800)}
.date-row .y-sel{width:120px}
.date-row .m-sel{width:55px}
.date-row .d-sel{width:55px}
.date-row span{font-size:11px;color:var(--ink-500)}

.pc-ft{display:flex;justify-content:flex-end;padding:8px 12px 10px;background:var(--ink-50);border-top:1px solid var(--ink-200)}
.btn-del{background:transparent;border:none;color:var(--danger);padding:0 10px;height:26px;border-radius:6px;font-size:11.5px;font-weight:500}
.btn-del:hover{background:rgba(140,42,43,.08)}

.btn-add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:40px;margin-top:4px;background:var(--white);color:var(--brand-800);border:1.5px dashed var(--ink-300);border-radius:6px;font-weight:600;font-size:13px;transition:all .12s;font-family:inherit}
.btn-add:hover{border-color:var(--brand-700);background:#f0f4f8;color:var(--brand-900);border-style:solid}

.auto-note{font-size:10px;color:var(--ink-500);padding:4px 12px 8px;background:var(--ink-50)}

/* 右: 図 */
.main{flex:1;overflow:auto;background:var(--ink-100);position:relative}
.diagram{position:relative;width:3000px;height:3000px;padding:30px 40px;background:var(--paper);margin:10px;box-shadow:var(--shadow-2),0 0 0 1px var(--ink-200);font-family:var(--ff-doc);color:var(--ink-900);transform-origin:0 0;border-radius:2px}
.diagram svg{position:absolute;top:0;left:0;pointer-events:none}
.dhdr{position:absolute;z-index:1;font-family:var(--ff-doc);cursor:grab}
.dhdr.dragging{cursor:grabbing;opacity:.7}
.dhdr.selected{outline:3px solid var(--brand-700);outline-offset:4px;border-radius:4px}
.dtitle{font-size:26px;font-weight:600;color:var(--ink-900);margin-bottom:16px;letter-spacing:.08em}
.dsub{font-size:16px;font-weight:400;color:var(--ink-800);line-height:2.0;letter-spacing:.04em}
.dsub .dlabel{display:inline-block;width:9em;text-align-last:justify;margin-right:1em;color:var(--ink-700)}

.dfooter{font-family:var(--ff-doc);font-size:18px;text-align:center;color:var(--ink-800);position:absolute;z-index:1;cursor:grab;letter-spacing:.2em}
.dfooter.dragging{cursor:grabbing;opacity:.7}
.dfooter.selected{outline:3px solid var(--brand-700);outline-offset:4px;border-radius:4px}

/* カード */
.card{position:absolute;min-width:220px;width:max-content;max-width:400px;border:1px solid var(--ink-300);border-radius:4px;background:var(--white);font-size:14px;z-index:1;box-shadow:var(--shadow-1);cursor:grab;user-select:none;font-family:var(--ff-doc);color:var(--ink-900);overflow:hidden;transition:box-shadow .14s,border-color .14s}
.card:hover{box-shadow:var(--shadow-2);border-color:var(--ink-400)}
.card.selected{outline:2px solid var(--brand-700);outline-offset:0;box-shadow:0 0 0 3px rgba(51,74,102,.15),var(--shadow-2)}
.card.dragging{cursor:grabbing;box-shadow:0 8px 24px rgba(20,17,14,.18);z-index:10;opacity:.95}
.card-h{padding:5px 10px;font-weight:600;font-size:13px;border-bottom:1px dashed var(--ink-200);letter-spacing:.1em;font-family:var(--ff-ui);background:var(--ink-50);color:var(--ink-800)}
.card-b{padding:8px 12px;line-height:1.5}
.card-b .f{display:flex;margin-bottom:2px}
.card-b .l{width:38px;color:var(--ink-600);font-weight:500;flex-shrink:0;font-family:var(--ff-ui);font-size:11px;letter-spacing:.08em;align-self:center}
.card-b .v{flex:1;white-space:nowrap;color:var(--ink-900)}
.card-b .v-addr{flex:1;white-space:pre-wrap;color:var(--ink-900)}
.card-d{display:flex;gap:3px;padding:6px 10px 8px;border-top:1px solid var(--ink-200);background:var(--ink-50);flex-wrap:wrap;font-family:var(--ff-ui)}
.tag{padding:1px 6px;border:1px solid var(--ink-300);border-radius:2px;font-size:10px;font-weight:600;color:var(--ink-700);background:var(--white);letter-spacing:.08em}

.c-被相続人{border-color:var(--ink-300);background:var(--white)} .c-被相続人 .card-h{background:var(--role-bsz-bg);color:var(--role-bsz);border-bottom-color:var(--role-bsz)}
.c-相続人{border-color:var(--ink-300);background:var(--white)} .c-相続人 .card-h{background:var(--role-heir-bg);color:var(--role-heir);border-bottom-color:var(--role-heir)}
.c-遺産分割{border-color:var(--ink-300);background:var(--white)} .c-遺産分割 .card-h{background:var(--role-waiver-bg);color:var(--role-waiver);border-bottom-color:var(--role-waiver)}
.c-先死亡{border-color:var(--ink-300);background:var(--white)} .c-先死亡 .card-h{background:var(--role-pre-bg);color:var(--role-pre);border-bottom-color:var(--role-pre)}
.c-相続後死亡{border-color:var(--ink-300);background:var(--white)} .c-相続後死亡 .card-h{background:var(--role-post-bg);color:var(--role-post);border-bottom-color:var(--role-post)}
.c-数次相続人{border-color:var(--ink-300);background:var(--white)} .c-数次相続人 .card-h{background:var(--role-suuji-bg);color:var(--role-suuji);border-bottom-color:var(--role-suuji)}
.c-無関係{border-color:var(--ink-300);background:var(--white)} .c-無関係 .card-h{background:var(--role-none-bg);color:var(--role-none);border-bottom-color:var(--role-none)}
.c-相続人兼数次相続人{border-color:var(--ink-300);background:var(--white)} .c-相続人兼数次相続人 .card-h{background:var(--role-both-bg);color:var(--role-both);border-bottom-color:var(--role-both)}

/* 範囲選択 */
.sel-rect{position:absolute;border:2px dashed var(--brand-700);background:rgba(51,74,102,.1);z-index:50;pointer-events:none}

/* プレビューモード */
.preview-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#555;z-index:200;overflow:auto}
.preview-overlay.active{display:flex;flex-direction:column;align-items:center}
.preview-a4{position:relative;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5);width:210mm;height:297mm;margin:20px auto 60px;overflow:hidden;flex-shrink:0}
.preview-a4 .diagram{position:absolute;top:0;left:0;width:3000px;height:3000px;margin:0;box-shadow:none;transform-origin:0 0;cursor:grab}
.preview-a4 .diagram.grabbing{cursor:grabbing}
.preview-ctrl{position:fixed;bottom:0;left:0;right:0;background:rgba(30,30,30,.95);color:#ccc;padding:10px 20px;display:flex;align-items:center;gap:12px;font-size:12px;z-index:201;justify-content:center}
.preview-ctrl span{min-width:45px;text-align:center;font-weight:600}
.preview-ctrl button{padding:8px 20px;border:none;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer}
.preview-ctrl button:hover{opacity:.85}
.pv-btn-back{background:#fff;color:#333}
.pv-btn-print{background:var(--brand-800);color:var(--ink-100)}
.pv-btn-print:hover{background:var(--brand-900);color:#fff}

@page{size:A4;margin:0mm}
@media print{
  html,body{margin:0!important;padding:0!important;background:#fff!important;width:210mm!important;height:297mm!important}
  .header,.preview-ctrl,.side,.sel-rect,.share-fab{display:none!important}
  .wrap{display:none!important}
  .preview-overlay.active{display:block!important;position:static!important;background:#fff!important;padding:0!important;margin:0!important}
  .preview-a4{box-shadow:none!important;margin:0!important;padding:0!important;width:210mm!important;height:297mm!important;overflow:hidden!important;position:relative!important}
  .preview-a4 .diagram{margin:0!important;box-shadow:none!important;padding:0!important}
  .card{box-shadow:none!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card-h{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .c-被相続人,.c-相続人,.c-遺産分割,.c-先死亡,.c-相続後死亡,.c-数次相続人{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .dfooter{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* ウィザード */
.wiz-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;justify-content:center;align-items:center}
.wiz-overlay.active{display:flex}
.wiz-box{background:#fff;border-radius:12px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.wiz-hd{background:var(--ink-900);color:var(--ink-100);padding:16px 24px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
.wiz-hd h2{font-size:15px;margin:0;font-weight:600;letter-spacing:.04em}
.wiz-hd .wiz-close{background:none;border:none;color:rgba(255,255,255,.55);font-size:20px;cursor:pointer;padding:0 4px}
.wiz-hd .wiz-close:hover{color:var(--ink-100)}
.wiz-progress{height:3px;background:var(--ink-200)}.wiz-progress-bar{height:3px;background:var(--brand-700);transition:width .3s}
.wiz-body{padding:24px}
.wiz-q{font-size:15px;font-weight:600;color:var(--ink-900);margin-bottom:6px;line-height:1.6;letter-spacing:.01em}
.wiz-hint{font-size:12px;color:var(--ink-600);margin-bottom:16px;line-height:1.5}
.wiz-btns{display:flex;gap:8px;flex-wrap:wrap}
.wiz-btn{padding:10px 22px;border-radius:8px;border:1px solid var(--ink-200);background:var(--white);color:var(--ink-800);font-weight:500;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.wiz-btn:hover{border-color:var(--brand-700);background:#f0f4f8;color:var(--brand-900)}
.wiz-btn.primary{background:var(--brand-800);color:var(--ink-100);border-color:var(--brand-800);font-weight:600}
.wiz-btn.primary:hover{background:var(--brand-900);border-color:var(--brand-900);color:#fff}
.wiz-input{width:100%;padding:10px 14px;border:1px solid var(--ink-200);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:8px;box-sizing:border-box;color:var(--ink-800);background:var(--white)}
.wiz-input:focus{border-color:var(--brand-700);outline:none;box-shadow:0 0 0 3px rgba(51,74,102,.1)}
.wiz-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;margin-bottom:8px;letter-spacing:.04em}
.wiz-tag-blue{background:#dde7ef;color:var(--brand-800)}
.wiz-ft{padding:12px 24px;border-top:1px solid var(--ink-200);display:flex;justify-content:space-between}
.wiz-back{background:none;border:none;color:var(--ink-600);font-size:13px;cursor:pointer;font-family:inherit;padding:6px 0}
.wiz-back:hover{color:var(--ink-800)}
.wiz-multi{display:flex;flex-direction:column;gap:8px}
.wiz-multi button{text-align:left;padding:12px 16px;line-height:1.5}
.wiz-multi .wiz-sub{font-size:11px;color:var(--ink-600);margin-top:2px;font-weight:400}
.wiz-summary{background:var(--ink-50);border:1px solid var(--ink-200);border-radius:8px;padding:14px;font-size:13px;line-height:2;white-space:pre-line;margin-bottom:16px;color:var(--ink-800)}
/* お客様モード */
body.client-mode .header,body.client-mode .wrap,body.client-mode .share-fab{display:none!important}
body.client-mode .wiz-overlay{display:flex!important;background:linear-gradient(135deg,#f5f7fa,#e4e9f0)}
body.client-mode .wiz-box{width:720px;max-width:95vw;box-shadow:0 12px 60px rgba(0,0,0,.2)}
body.client-mode .wiz-body{padding:32px}
body.client-mode .wiz-q{font-size:17px}
body.client-mode .wiz-hint{font-size:13px}
body.client-mode .wiz-btn{padding:12px 26px;font-size:14px}
body.client-mode .wiz-input{padding:12px 16px;font-size:15px}
body.client-mode .wiz-hd .wiz-close{display:none}
.wiz-client-banner{background:var(--ink-50);border:1px solid var(--ink-200);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--ink-800);line-height:1.6;border-left:4px solid var(--brand-700)}
.wiz-code-area{width:100%;min-height:80px;padding:10px;border:1px solid var(--ink-200);border-radius:8px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;word-break:break-all;resize:none;box-sizing:border-box;margin-bottom:12px;background:var(--white);color:var(--ink-800)}

</style>
</head>
<body>

<div class="header">
  <h1>相続関係説明図 作成ツール</h1>
  <div class="hdr-btns">
    <button class="btn-undo" onclick="undo()" title="Ctrl+Z">↩</button>
    <button class="btn-redo" onclick="redo()" title="Ctrl+Y">↪</button>
    <span class="hdr-sep"></span>
    <button onclick="openWizard()" style="background:var(--ink-100);color:var(--ink-900);font-weight:600">⚡ かんたん入力</button>
    <button onclick="saveJSON()">保存</button>
    <button onclick="openLoadDialog()">読込</button>
    <span class="hdr-sep"></span>
    <button onclick="toggleTags()" id="btnTags">タグ: ON</button>
    <button onclick="toggleLayout()" id="btnLayout">配置: 縦</button>
    <button onclick="togglePreview()">プレビュー・印刷</button>
  </div>
</div>
<input type="file" id="fi" accept=".json" style="display:none">
<button class="share-fab" onclick="openShareClient()">📤 ヒアリングシート送付</button>

<div class="wrap">
  <div class="side">
    <div class="side-head">
      <label>被相続人の最後の本籍</label>
      <input id="inHonseki" placeholder="東京都..." onchange="draw()">
      <label>被相続人の最後の住所</label>
      <input id="inLastAddr" placeholder="東京都..." onchange="draw()">
      <label>登記上の住所</label>
      <input id="inRegAddr" placeholder="登記簿上の住所..." onchange="draw()">
    </div>
    <div class="plist" id="plist"></div>
    <div style="padding:12px 14px 14px;border-top:1px solid var(--ink-200);background:var(--white)">
      <button class="btn-add" onclick="addPerson()">+ 人物を追加</button>
    </div>
  </div>
  <div class="main">
    <div class="diagram" id="diagram"></div>
  </div>
</div>

<script>
let P = [], uid = 1, activeTab = {};
let undoStack = [], redoStack = [], undoLock = false;
function saveUndo(){if(undoLock)return;undoStack.push(getSnapshot());if(undoStack.length>50)undoStack.shift();redoStack=[];}
function getSnapshot(){return JSON.stringify({P,uid,h:document.getElementById('inHonseki')?.value||'',l:document.getElementById('inLastAddr')?.value||'',r:document.getElementById('inRegAddr')?.value||''});}
function applySnapshot(s){const d=JSON.parse(s);P=d.P;uid=d.uid;const hEl=document.getElementById('inHonseki'),lEl=document.getElementById('inLastAddr'),rEl=document.getElementById('inRegAddr');if(hEl)hEl.value=d.h;if(lEl)lEl.value=d.l;if(rEl)rEl.value=d.r;undoLock=true;renderList(-1);draw();undoLock=false;}
function undo(){if(!undoStack.length)return;redoStack.push(getSnapshot());applySnapshot(undoStack.pop());}
function redo(){if(!redoStack.length)return;undoStack.push(getSnapshot());applySnapshot(redoStack.pop());}
let cardPositions = {};
let footerPos = null;
let hdrPos = null; // ヘッダーのドラッグ位置
let hdrScale = 1.0; // ヘッダーのスケール
let footerScale = 1.0; // フッターのスケール
let showTags = true; // タグ一括表示/非表示
let layoutDir = 'vertical'; // 'vertical'=縦配置, 'horizontal'=横配置
let cardPositionsV = {}; // 縦モード用カード位置
let cardPositionsH = {}; // 横モード用カード位置
let currentSvg = null, currentCards = null, currentById = null;
let previewScale = 50;
let selectedIds = new Set();

const ZOKUGARA = ['','妻','夫','長男','二男','三男','四男','五男','長女','二女','三女','四女','五女','父','母','養父','養母','兄','姉','弟','妹','孫','甥','姪'];
const DOCS = {
  '被相続人': ['生亡','住所'],
  '相続人': ['現戸','住所','印証','遺分'],
  '遺産分割': ['現戸','印証','遺分'],
  '先死亡': ['生亡'],
  '相続後死亡': ['生亡'],
  '数次相続人': ['現戸','住所','印証','遺分'],
  '相続人兼数次相続人': ['現戸','住所','印証','遺分'],
  '無関係': []
};
const ROLE_DISP = { '相続後死亡': '相続後死亡(数次)' };

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function allSpouses(p){const a=[];if(p.spouse)a.push(String(p.spouse));(p.exSpouses||[]).forEach(id=>{if(id)a.push(String(id))});return a;}

// 元号が重複する年: 値に"年H"等の接尾辞を付けて旧元号を表す
// 2019H=平成31年, 1989S=昭和64年, 1926T=大正15年
const DUAL_ERA_YEARS=[
  {y:2019,suffix:'H',label:'平成31年'},
  {y:1989,suffix:'S',label:'昭和64年'},
  {y:1926,suffix:'T',label:'大正15年'}
];
function parseYearVal(v){
  if(!v)return{y:0,era:''};
  const s=String(v);
  const d=DUAL_ERA_YEARS.find(d=>s===d.y+d.suffix);
  if(d)return{y:d.y,era:d.label.replace('年','')};
  return{y:+s,era:''};
}
function makeYears(){
  let opts = '<option value="">--</option>';
  for(let y=2026;y>=1868;y--){
    opts += `<option value="${y}">${warekiYear(y)} (${y})</option>`;
    const dual=DUAL_ERA_YEARS.find(d=>d.y===y);
    if(dual) opts += `<option value="${y}${dual.suffix}">${dual.label} (${y})</option>`;
  }
  return opts;
}
function warekiYear(y){
  if(y>=2019) return '令和'+(y-2018===1?'元':y-2018)+'年';
  if(y>=1989) return '平成'+(y-1988===1?'元':y-1988)+'年';
  if(y>=1926) return '昭和'+(y-1925===1?'元':y-1925)+'年';
  if(y>=1912) return '大正'+(y-1911===1?'元':y-1911)+'年';
  return '明治'+(y-1867)+'年';
}
function makeMonths(){
  let o='<option value="">--</option>';
  for(let m=1;m<=12;m++) o+=`<option value="${m}">${m}月</option>`;
  return o;
}
function makeDays(){
  let o='<option value="">--</option>';
  for(let d=1;d<=31;d++) o+=`<option value="${d}">${d}日</option>`;
  return o;
}
const YEAR_OPTS = makeYears(), MONTH_OPTS = makeMonths(), DAY_OPTS = makeDays();

function dateToObj(p, prefix){
  return { y: p[prefix+'Y']||'', m: p[prefix+'M']||'', d: p[prefix+'D']||'' };
}
function dateToStr(p, prefix){
  const o = dateToObj(p, prefix);
  if(!o.y) return '';
  const pv=parseYearVal(o.y);
  if(!pv.y) return '';
  const eraStr=pv.era?pv.era:warekiYear(pv.y).replace('年','');
  return eraStr + '年' + (o.m?o.m+'月':'') + (o.d?o.d+'日':'');
}
function dateToNum(p, prefix){
  const o = dateToObj(p, prefix);
  if(!o.y) return 0;
  const pv=parseYearVal(o.y);
  return pv.y*10000 + (+o.m||0)*100 + (+o.d||0);
}

const ROLE_LIST = ['','相続人','遺産分割','先死亡','相続後死亡','数次相続人','相続人兼数次相続人','無関係'];

function toggleTags(){
  showTags=!showTags;
  document.getElementById('btnTags').textContent='タグ: '+(showTags?'ON':'OFF');
  draw();
}

function toggleLayout(){
  // 現モードの位置を退避
  if(layoutDir==='vertical') cardPositionsV=Object.assign({},cardPositions);
  else cardPositionsH=Object.assign({},cardPositions);
  // 切り替え
  layoutDir=layoutDir==='vertical'?'horizontal':'vertical';
  // 新モードの位置を復元（なければ空で自動レイアウト）
  if(layoutDir==='vertical') cardPositions=Object.assign({},cardPositionsV);
  else cardPositions=Object.assign({},cardPositionsH);
  document.getElementById('btnLayout').textContent='配置: '+(layoutDir==='vertical'?'縦':'横');
  footerPos=null; // フッター位置もリセット
  draw();
}

function autoRoles(){
  const hisou = P.find(p => p.isBSZ);
  if(!hisou) return;
  const deathNum = dateToNum(hisou, 'death');
  // 第1パス: 基本ロール判定
  P.forEach(p => {
    if(p.isBSZ){ p.role = '被相続人'; p._autoRole = '被相続人'; return; }
    const pDeath = dateToNum(p, 'death');
    let autoRole;
    if(pDeath === 0){
      autoRole = '相続人';
    } else if(deathNum && pDeath < deathNum){
      autoRole = '先死亡';
    } else if(deathNum && pDeath >= deathNum){
      autoRole = '相続後死亡';
    } else {
      autoRole = '相続人';
    }
    p._autoRole = autoRole;
    p.role = p.roleOverride || autoRole;
  });
  // 第2パス: 数次相続人の判定（相続後死亡の配偶者・子）
  const bszId = String(hisou.id);
  const suujiIds = new Set(P.filter(p => p.role === '相続後死亡').map(p => String(p.id)));
  P.forEach(p => {
    if(p.role !== '相続人') return;
    if(p.roleOverride) return;
    const isChildOfSuuji = (p.father && suujiIds.has(String(p.father))) || (p.mother && suujiIds.has(String(p.mother)));
    const isSpouseOfSuuji = p.spouse && suujiIds.has(String(p.spouse));
    if(!isChildOfSuuji && !isSpouseOfSuuji) return;
    // 被相続人の直接の相続人かどうか判定
    const isHeirOfBSZ = String(p.father)===bszId || String(p.mother)===bszId || String(p.spouse)===bszId;
    p.role = isHeirOfBSZ ? '相続人兼数次相続人' : '数次相続人';
  });
}

// === UI ===
function addPerson(){
  P.push({ id:uid++, name:'', relation:'', role:'', roleOverride:'', isBSZ:false,
    birthY:'', birthM:'', birthD:'', deathY:'', deathM:'', deathD:'',
    father:'', mother:'', spouse:'', exSpouses:[], address:'' });
  autoRoles();
  renderList(P.length-1);
  draw();
}

function renderList(openIdx){
  const ct = document.getElementById('plist');
  ct.innerHTML = '';
  P.forEach((p,i) => {
    const rc = p.role ? 'r-'+p.role : '';
    const isOpen = i===openIdx;
    const div = document.createElement('div');
    div.className = `pc ${rc} ${isOpen?'open':''}`;

    const dn = p.name||'(未入力)';
    const dr = ROLE_DISP[p.role]||p.role||'';
    const badgeCls = p.role ? 'bg-'+p.role : '';

    const otherOpts = P.filter(x=>x.id!==p.id).map(x=>`<option value="${x.id}">${x.name||'(未入力)'}</option>`).join('');

    const curTab = activeTab[i] || 0;
    div.innerHTML = `
      <div class="pc-hd" onclick="toggle(${i})">
        <div>
          <span class="pc-nm">${esc(dn)}</span>
          ${dr?`<span class="pc-badge ${badgeCls}">${dr}</span>`:''}
          <span class="pc-sub">${p.relation?'('+esc(p.relation)+')':''}</span>
        </div>
        <span class="pc-tgl">&#9662;</span>
      </div>
      <div class="pc-bd">
        <div class="tabs">
          <button class="tab ${curTab===0?'active':''}" onclick="switchTab(this,${i},0)">基本情報</button>
          <button class="tab ${curTab===1?'active':''}" onclick="switchTab(this,${i},1)">日付/立場</button>
        </div>
        <div class="tab-body">
          <div class="tab-pane ${curTab===0?'active':''}" data-tab="0">
            <div class="fg-row">
              <div class="fg"><label>氏名</label><input value="${esc(p.name)}" data-i="${i}" data-f="name"></div>
              ${!p.isBSZ?`<div class="fg"><label>続柄</label><select data-i="${i}" data-f="relation">${ZOKUGARA.map(z=>`<option value="${z}" ${z===p.relation?'selected':''}>${z||'-- 選択 --'}</option>`).join('')}<option value="__custom__" ${p.relation&&!ZOKUGARA.includes(p.relation)?'selected':''}>その他（自由入力）</option></select>${(p.relation&&!ZOKUGARA.includes(p.relation))||p._customRel?`<input value="${esc(p.relation)}" data-i="${i}" data-f="relationCustom" placeholder="続柄を入力" style="margin-top:4px">`:''}</div>`:''}
            </div>
            <div class="fg-row">
              <div class="fg"><label>父</label><select data-i="${i}" data-f="father"><option value="">-- なし --</option>${otherOpts}</select></div>
              <div class="fg"><label>母</label><select data-i="${i}" data-f="mother"><option value="">-- なし --</option>${otherOpts}</select></div>
            </div>
            <div class="fg"><label>配偶者</label><select data-i="${i}" data-f="spouse"><option value="">-- なし --</option>${otherOpts}</select></div>
            <div class="fg"><label>前配偶者</label><div class="ex-spouses-list" data-i="${i}">${(p.exSpouses||[]).map((eid,ei)=>`<div class="ex-sp-row" style="display:flex;gap:4px;margin-bottom:4px"><select data-i="${i}" data-f="exSpouse" data-ei="${ei}"><option value="">-- なし --</option>${otherOpts}</select><button type="button" onclick="removeExSpouse(${i},${ei})" style="padding:2px 6px;font-size:12px">✕</button></div>`).join('')}</div><button type="button" onclick="addExSpouse(${i})" style="margin-top:4px;padding:2px 8px;font-size:12px">＋ 前配偶者を追加</button></div>
            ${!p.isBSZ?`<div class="fg"><label>住所</label><textarea data-i="${i}" data-f="address" placeholder="東京都新宿区..." rows="2" style="width:100%;resize:vertical">${esc(p.address||'')}</textarea></div>`:''}
          </div>
          <div class="tab-pane ${curTab===1?'active':''}" data-tab="1">
            <div class="fg"><label>生年月日</label>
              <div class="date-row">
                <select class="y-sel" data-i="${i}" data-f="birthY">${YEAR_OPTS}</select>
                <select class="m-sel" data-i="${i}" data-f="birthM">${MONTH_OPTS}</select>
                <select class="d-sel" data-i="${i}" data-f="birthD">${DAY_OPTS}</select>
              </div>
            </div>
            <div class="fg"><label>死亡年月日</label>
              <div class="date-row">
                <select class="y-sel" data-i="${i}" data-f="deathY">${YEAR_OPTS}</select>
                <select class="m-sel" data-i="${i}" data-f="deathM">${MONTH_OPTS}</select>
                <select class="d-sel" data-i="${i}" data-f="deathD">${DAY_OPTS}</select>
              </div>
            </div>
            ${!p.isBSZ?`<div class="fg" style="margin-top:10px;padding-top:8px;border-top:1px solid #e0e0e0"><label>立場 <span style="font-weight:400;color:#aaa">（自動: ${p._autoRole||p.role}）</span></label><select data-i="${i}" data-f="roleOverride">${ROLE_LIST.map(r=>`<option value="${r}" ${r===p.roleOverride?'selected':''}>${r||'自動判定'}</option>`).join('')}</select></div>`:''}
          </div>
        </div>
        <div class="pc-ft">${!p.isBSZ?`<button class="btn-del" onclick="delPerson(${i})">削除</button>`:''}</div>
      </div>
    `;
    ct.appendChild(div);

    div.querySelector('[data-f="birthY"]').value = p.birthY||'';
    div.querySelector('[data-f="birthM"]').value = p.birthM||'';
    div.querySelector('[data-f="birthD"]').value = p.birthD||'';
    div.querySelector('[data-f="deathY"]').value = p.deathY||'';
    div.querySelector('[data-f="deathM"]').value = p.deathM||'';
    div.querySelector('[data-f="deathD"]').value = p.deathD||'';
    div.querySelector('[data-f="father"]').value = p.father||'';
    div.querySelector('[data-f="mother"]').value = p.mother||'';
    div.querySelector('[data-f="spouse"]').value = p.spouse||'';
    div.querySelectorAll('[data-f="exSpouse"]').forEach(el=>{
      el.value = (p.exSpouses||[])[+el.dataset.ei]||'';
    });

    div.querySelectorAll('input:not([type="checkbox"]),textarea').forEach(el=>{
      el.addEventListener('input', onInput);
      el.addEventListener('change', onChange);
    });
    div.querySelectorAll('select').forEach(el=>el.addEventListener('change', onChange));
  });
}

function toggle(idx){
  const cards = document.querySelectorAll('.pc');
  cards.forEach((c,i)=>{ if(i===idx) c.classList.toggle('open'); else c.classList.remove('open'); });
}

function addExSpouse(i){
  if(!P[i].exSpouses)P[i].exSpouses=[];
  P[i].exSpouses.push('');
  const openIdx=[...document.querySelectorAll('.pc')].findIndex(c=>c.classList.contains('open'));
  renderList(openIdx);
}
function removeExSpouse(i,ei){
  P[i].exSpouses.splice(ei,1);
  const openIdx=[...document.querySelectorAll('.pc')].findIndex(c=>c.classList.contains('open'));
  renderList(openIdx);draw();
}

function openPersonCard(idx){
  const cards = document.querySelectorAll('.pc');
  cards.forEach((c,i)=>{ if(i===idx) c.classList.add('open'); else c.classList.remove('open'); });
  // スクロールして見えるようにする
  if(cards[idx]) cards[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
}

function switchTab(btn, personIdx, tabIdx){
  activeTab[personIdx] = tabIdx;
  const body = btn.closest('.pc-bd');
  body.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  body.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  body.querySelector(`[data-tab="${tabIdx}"]`).classList.add('active');
}

function onInput(e){
  const i=+e.target.dataset.i, f=e.target.dataset.f;
  if(i>=P.length)return;
  P[i][f]=e.target.value;
  const card=e.target.closest('.pc');
  if(f==='name') card.querySelector('.pc-nm').textContent=P[i].name||'(未入力)';
  if(f==='relationCustom'){
    P[i].relation=e.target.value;
    card.querySelector('.pc-sub').textContent=P[i].relation?'('+P[i].relation+')':'';
  }
  draw();
}

function onChange(e){
  const i=+e.target.dataset.i, f=e.target.dataset.f;
  if(i>=P.length)return;
  if(f==='exSpouse'){
    const ei=+e.target.dataset.ei;
    if(!P[i].exSpouses)P[i].exSpouses=[];
    P[i].exSpouses[ei]=e.target.value;
    autoRoles();
    const openIdx=[...document.querySelectorAll('.pc')].findIndex(c=>c.classList.contains('open'));
    renderList(openIdx);draw();return;
  }
  P[i][f]=e.target.value;

  if(f==='relation' && e.target.value==='__custom__'){
    P[i].relation='';
    P[i]._customRel=true;
    autoRoles();
    const openIdx=[...document.querySelectorAll('.pc')].findIndex(c=>c.classList.contains('open'));
    renderList(openIdx);
    draw();
    return;
  }
  if(f==='relationCustom'){
    P[i].relation=e.target.value;
    if(e.target.value) P[i]._customRel=false;
    draw();
    return;
  }
  if(f==='relation' && e.target.value!=='__custom__'){
    P[i]._customRel=false;
  }

  if(f==='spouse'){
    P.forEach((x,j)=>{if(j!==i&&String(x.spouse)===String(P[i].id))x.spouse='';});
    if(e.target.value){const sp=P.find(x=>String(x.id)===e.target.value);if(sp)sp.spouse=String(P[i].id);}
  }

  autoRoles();
  const openIdx=[...document.querySelectorAll('.pc')].findIndex(c=>c.classList.contains('open'));
  renderList(openIdx);
  draw();
}

function delPerson(i){
  if(!confirm(P[i].name?`「${P[i].name}」を削除しますか？`:'この人物を削除しますか？'))return;
  const rm=P.splice(i,1)[0];
  P.forEach(p=>{
    if(String(p.father)===String(rm.id))p.father='';
    if(String(p.mother)===String(rm.id))p.mother='';
    if(String(p.spouse)===String(rm.id))p.spouse='';
    if(p.exSpouses)p.exSpouses=p.exSpouses.filter(id=>String(id)!==String(rm.id));
  });
  autoRoles();
  renderList(-1);
  draw();
}

// ===== 図 =====
const CW=220, HGAP=50, VGAP=160;
const SNAP=20;
function snap(v){return Math.round(v/SNAP)*SNAP;}

function draw(){
  saveUndo();
  const dg=document.getElementById('diagram');
  dg.innerHTML='';

  const hk=document.getElementById('inHonseki').value;
  const la=document.getElementById('inLastAddr').value;
  const ra=document.getElementById('inRegAddr').value;
  const hisou=P.find(p=>p.isBSZ);
  const hasData=P.some(p=>p.name);

  if(!hasData) return;

  // ヘッダー
  const hdr=document.createElement('div');
  hdr.className='dhdr';
  let hdrHtml=`<div class="dtitle">被相続人　${esc(hisou?hisou.name:'')}　相続関係説明図</div>`;
  let subLines=[];
  if(hk) subLines.push('<span class="dlabel">最後の本籍</span>'+esc(hk));
  if(la) subLines.push('<span class="dlabel">最後の住所</span>'+esc(la));
  if(ra) subLines.push('<span class="dlabel">登記簿上の住所</span>'+esc(ra));
  if(subLines.length) hdrHtml+='<div class="dsub">'+subLines.join('<br>')+'</div>';
  hdr.innerHTML=hdrHtml;
  const hx=hdrPos?hdrPos.x:30;
  const hy=hdrPos?hdrPos.y:20;
  hdr.style.left=hx+'px';hdr.style.top=hy+'px';
  hdr.style.transform='scale('+hdrScale+')';
  hdr.style.transformOrigin='0 0';
  dg.appendChild(hdr);
  initHdrDrag(hdr);
  hdr.addEventListener('wheel',e=>{
    if(isPreviewActive())return;
    e.preventDefault();e.stopPropagation();
    const delta=e.deltaY>0?-0.05:0.05;
    hdrScale=Math.max(0.3,Math.min(3.0,hdrScale+delta));
    hdr.style.transform='scale('+hdrScale+')';
  },{passive:false});

  const headerH=hdr.offsetHeight+hy+30;

  const byId={};P.forEach(p=>byId[p.id]=p);
  const layout=calcLayout(byId,headerH);

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
  dg.appendChild(svg);

  // レイアウト計算後、全カードの位置を確定保存
  layout.forEach(L=>{
    if(!cardPositions[L.p.id]) cardPositions[L.p.id]={x:L.x,y:L.y};
  });

  const cards={};
  layout.forEach(L=>{
    const px=cardPositions[L.p.id].x;
    const py=cardPositions[L.p.id].y;
    const el=mkCard(L.p,px,py);
    dg.appendChild(el);
    cards[L.p.id]={x:px,y:py,el};
    initDrag(el,L.p.id);
    el.addEventListener('wheel',e=>{
      if(isPreviewActive())return;
      if(selectedIds.size<2||!selectedIds.has(L.p.id))return;
      e.preventDefault();e.stopPropagation();
      const delta=e.deltaY>0?-0.05:0.05;
      const ids=[...selectedIds];
      // 中心基準で間隔を拡縮
      let cx=0,cy=0;
      ids.forEach(id=>{if(cards[id]){cx+=cards[id].x;cy+=cards[id].y;}});
      cx/=ids.length; cy/=ids.length;
      const ratio=1+delta;
      ids.forEach(id=>{
        if(!cards[id])return;
        const c=cards[id];
        const nx=Math.round(cx+(c.x-cx)*ratio);
        const ny=Math.round(cy+(c.y-cy)*ratio);
        c.x=nx; c.y=ny;
        c.el.style.left=nx+'px'; c.el.style.top=ny+'px';
        cardPositions[id]={x:nx,y:ny};
      });
      if(currentSvg&&currentCards&&currentById) drawLines(currentSvg,currentCards,currentById);
    },{passive:false});
  });

  currentSvg=svg; currentCards=cards; currentById=byId;

  // フッター
  const ftr=document.createElement('div');
  ftr.className='dfooter';
  ftr.textContent='戸籍謄抄本及び除籍謄本は還付した';
  dg.appendChild(ftr);

  requestAnimationFrame(()=>{
    Object.values(cards).forEach(c=>{c.h=c.el.offsetHeight;c.w=CW;});
    drawLines(svg,cards,byId);
    let mx=0,my=0;
    Object.values(cards).forEach(c=>{mx=Math.max(mx,c.x+c.w+80);my=Math.max(my,c.y+c.h+80);});
    const fx=footerPos?footerPos.x:(mx-200);
    const fy=footerPos?footerPos.y:(my+20);
    ftr.style.left=fx+'px';ftr.style.top=fy+'px';
    ftr.style.transform='scale('+footerScale+')';
    ftr.style.transformOrigin='0 0';
    initFooterDrag(ftr);
    ftr.addEventListener('wheel',e=>{
      if(isPreviewActive())return;
      e.preventDefault();e.stopPropagation();
      const delta=e.deltaY>0?-0.05:0.05;
      footerScale=Math.max(0.3,Math.min(3.0,footerScale+delta));
      ftr.style.transform='scale('+footerScale+')';
    },{passive:false});
    svg.setAttribute('width',3000);
    svg.setAttribute('height',3000);
  });
}

function calcLayout(byId,headerH){
  const root=P.find(p=>p.isBSZ)||P[0];
  const lvMap={};
  const visited=new Set();

  function assignLevel(p,lv){
    if(!p||visited.has(p.id))return;
    visited.add(p.id);
    lvMap[p.id]=lv;
    allSpouses(p).forEach(sid=>{
      if(byId[sid]&&!visited.has(+sid)){
        visited.add(+sid);
        lvMap[+sid]=lv;
      }
    });
  }

  function goUp(p,lv){
    [p.father,p.mother].forEach(pid=>{
      if(!pid||!byId[pid]||visited.has(+pid))return;
      assignLevel(byId[pid],lv-1);
      goUp(byId[pid],lv-1);
    });
  }

  function goDown(parentId,lv){
    P.forEach(p=>{
      if(visited.has(p.id))return;
      if(String(p.father)===String(parentId)||String(p.mother)===String(parentId)){
        assignLevel(p,lv);
        goDown(p.id,lv+1);
      }
    });
  }

  goUp(root,0);
  assignLevel(root,0);
  goDown(root.id,1);
  allSpouses(root).forEach(sid=>{if(byId[sid]) goDown(+sid,1);});

  let changed=true;
  while(changed){
    changed=false;
    P.forEach(p=>{
      if(visited.has(p.id))return;
      const fLv=p.father&&lvMap[+p.father]!==undefined?lvMap[+p.father]:null;
      const mLv=p.mother&&lvMap[+p.mother]!==undefined?lvMap[+p.mother]:null;
      const parentLv=fLv!==null?fLv:(mLv!==null?mLv:null);
      if(parentLv!==null){
        assignLevel(p,parentLv+1);
        goDown(p.id,parentLv+2);
        changed=true;
      }
    });
  }

  const maxLv=Math.max(0,...Object.values(lvMap));
  P.forEach(p=>{if(!visited.has(p.id)){visited.add(p.id);lvMap[p.id]=maxLv+1;}});

  const levels={};
  P.forEach(p=>{
    const lv=lvMap[p.id];
    if(!levels[lv])levels[lv]=[];
    levels[lv].push(p);
  });

  const sorted=Object.keys(levels).map(Number).sort((a,b)=>a-b);
  const minLv=sorted[0]||0;
  const result=[];
  const OX=40,OY=(headerH||80)+40;
  const horiz=layoutDir==='horizontal';

  sorted.forEach(lv=>{
    levels[lv].forEach((p,i)=>{
      if(horiz){
        result.push({p,x:OX+(lv-minLv)*(CW+HGAP),y:OY+i*VGAP});
      } else {
        result.push({p,x:OX+i*(CW+HGAP),y:OY+(lv-minLv)*VGAP});
      }
    });
  });

  // 配偶者隣接ヘルパー: 前配偶者は左側、現配偶者は右側に配置
  function enforceSpouseAdjacency(lv){
    const row=result.filter(r=>lvMap[r.p.id]===lv);
    if(horiz) row.sort((a,b)=>a.y-b.y); else row.sort((a,b)=>a.x-b.x);
    const done=new Set();
    row.forEach(r=>{
      if(done.has(r.p.id))return;
      const exIds=(r.p.exSpouses||[]).filter(id=>id&&byId[id]&&lvMap[+id]===lv).map(id=>+id);
      const curId=r.p.spouse&&byId[r.p.spouse]&&lvMap[+r.p.spouse]===lv?+r.p.spouse:null;
      if(!exIds.length&&!curId)return;
      done.add(r.p.id);
      if(horiz){
        let pos=r.y;
        exIds.forEach(eid=>{
          if(done.has(eid))return;done.add(eid);
          const sp=result.find(s=>s.p.id===eid);
          if(sp){sp.y=pos-VGAP;sp.x=r.x;pos=sp.y;}
        });
        if(curId&&!done.has(curId)){
          done.add(curId);
          const sp=result.find(s=>s.p.id===curId);
          if(sp){sp.y=r.y+VGAP;sp.x=r.x;}
        }
      } else {
        let posLeft=r.x;
        exIds.forEach(eid=>{
          if(done.has(eid))return;done.add(eid);
          const sp=result.find(s=>s.p.id===eid);
          if(sp){sp.x=posLeft-(CW+HGAP);posLeft=sp.x;sp.y=r.y;}
        });
        if(curId&&!done.has(curId)){
          done.add(curId);
          const sp=result.find(s=>s.p.id===curId);
          if(sp){sp.x=r.x+CW+HGAP;sp.y=r.y;}
        }
      }
    });
  }

  // 重なり解消ヘルパー（配偶者ペアを原子的に移動）
  function resolveOverlaps(lv){
    if(horiz){
      const row=result.filter(r=>lvMap[r.p.id]===lv).sort((a,b)=>a.y-b.y);
      for(let i=1;i<row.length;i++){
        const mn=row[i-1].y+VGAP;
        if(row[i].y<mn){
          const shift=mn-row[i].y;
          const spId=row[i].p.spouse;
          const sp=spId?row.find(s=>String(s.p.id)===String(spId)):null;
          for(let j=i;j<row.length;j++) row[j].y+=shift;
          if(sp && row.indexOf(sp)<i) sp.y=row[i].y-VGAP;
        }
      }
    } else {
      const row=result.filter(r=>lvMap[r.p.id]===lv).sort((a,b)=>a.x-b.x);
      for(let i=1;i<row.length;i++){
        const mn=row[i-1].x+CW+HGAP;
        if(row[i].x<mn){
          const shift=mn-row[i].x;
          const spId=row[i].p.spouse;
          const sp=spId?row.find(s=>String(s.p.id)===String(spId)):null;
          for(let j=i;j<row.length;j++) row[j].x+=shift;
          if(sp && row.indexOf(sp)<i) sp.x=row[i].x-CW-HGAP;
        }
      }
    }
  }

  // Step 1: 配偶者隣接
  sorted.forEach(lv=>enforceSpouseAdjacency(lv));

  // Step 2: 子を親中央に寄せる（配偶者ペアごとにグループ化）
  sorted.forEach(lv=>{
    if(!levels[lv-1])return;
    const used=new Set();
    const donePairs=new Set();
    levels[lv-1].forEach(parent=>{
      // 各配偶者ペアごとに子をグループ化して配置
      const spouseIds=allSpouses(parent);
      // 配偶者なしの子も含め、全ペアを処理
      const pairs=[...spouseIds.map(sid=>({sid:+sid})),{sid:null}];
      pairs.forEach(({sid})=>{
        const pairId=sid?Math.min(parent.id,sid)+'-'+Math.max(parent.id,sid):'solo-'+parent.id;
        if(donePairs.has(pairId))return;
        donePairs.add(pairId);
        const kids=(levels[lv]||[]).filter(c=>{
          if(used.has(c.id))return false;
          const cf=+c.father, cm=+c.mother;
          if(sid){
            return (cf===parent.id&&cm===sid)||(cm===parent.id&&cf===sid)||
              (cf===parent.id&&!cm&&sid)||(cm===parent.id&&!cf&&sid)||
              (cf===sid&&!cm)||(cm===sid&&!cf);
          } else {
            // 配偶者なし: 親だけが指定されている子
            return (cf===parent.id||cm===parent.id)&&!spouseIds.includes(String(cf))&&!spouseIds.includes(String(cm));
          }
        });
        if(!kids.length)return;
        kids.forEach(c=>used.add(c.id));
        const pPos=result.find(r=>r.p.id===parent.id);
        if(!pPos)return;
        const spPos=sid?result.find(r=>r.p.id===sid):null;

        if(horiz){
          let pcy;
          if(spPos){
            const tid=pPos.y<spPos.y?pPos:spPos;
            const bid=pPos.y<spPos.y?spPos:pPos;
            pcy=(tid.y+VGAP+bid.y)/2;
          } else { pcy=pPos.y+VGAP/2; }
          const th=kids.length*VGAP;
          const sy=pcy-th/2;
          kids.forEach((k,ci)=>{
            const kp=result.find(r=>r.p.id===k.id);
            if(kp) kp.y=sy+ci*VGAP;
          });
        } else {
          let pcx;
          if(spPos){
            const lid=pPos.x<spPos.x?pPos:spPos;
            const rid=pPos.x<spPos.x?spPos:pPos;
            pcx = (lid.x + CW + rid.x) / 2;
          } else {
            pcx = pPos.x + CW/2;
          }
          const tw=kids.length*CW+(kids.length-1)*HGAP;
          const sx=pcx-tw/2;
          kids.forEach((k,ci)=>{
            const kp=result.find(r=>r.p.id===k.id);
            if(kp) kp.x=sx+ci*(CW+HGAP);
          });
        }
      });
    });
  });

  // Step 3: 子レベルで配偶者隣接を再適用（子の配置で崩れた場合）
  sorted.forEach(lv=>enforceSpouseAdjacency(lv));

  // Step 4: 重なり解消
  sorted.forEach(lv=>resolveOverlaps(lv));

  // Step 5: 重なり解消後に配偶者隣接が崩れていないか最終チェック
  sorted.forEach(lv=>enforceSpouseAdjacency(lv));
  // 最終隣接で重なりが生じた場合の再解消
  sorted.forEach(lv=>resolveOverlaps(lv));

  // 端修正
  let mnX=Infinity,mnY=Infinity;
  result.forEach(r=>{if(r.x<mnX)mnX=r.x;if(r.y<mnY)mnY=r.y;});
  if(mnX<OX)result.forEach(r=>r.x+=OX-mnX);
  if(mnY<OY)result.forEach(r=>r.y+=OY-mnY);


  // 整数化（サブピクセル防止、SNAPは使わない）
  result.forEach(r=>{
    r.x=Math.round(r.x);
    r.y=Math.round(r.y);
  });

  return result;
}

function initDrag(el,pid){
  el.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    if(isPreviewActive())return;
    e.preventDefault();
    e.stopPropagation();
    const sx=e.clientX, sy=e.clientY;
    let moved=false;

    // 選択中のカードをまとめてドラッグ、未選択カードなら単体
    const dragIds=selectedIds.has(pid)?[...selectedIds]:[pid];
    const starts={};
    dragIds.forEach(id=>{starts[id]={x:currentCards[id].x,y:currentCards[id].y};});

    function onMove(e2){
      const dx=e2.clientX-sx, dy=e2.clientY-sy;
      if(!moved && Math.abs(dx)<3 && Math.abs(dy)<3) return;
      moved=true;
      dragIds.forEach(id=>{
        const c=currentCards[id];
        const nx=snap(starts[id].x+dx), ny=snap(starts[id].y+dy);
        c.el.style.left=nx+'px'; c.el.style.top=ny+'px';
        c.x=nx; c.y=ny;
        cardPositions[id]={x:nx,y:ny};
      });
      if(currentSvg&&currentCards&&currentById) drawLines(currentSvg,currentCards,currentById);
    }
    function onUp(){
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      // クリック（移動なし）→ 対応する入力欄を開く＆他の選択解除
      if(!moved){
        document.querySelectorAll('.dhdr.selected').forEach(c=>c.classList.remove('selected'));
        document.querySelectorAll('.dfooter.selected').forEach(c=>c.classList.remove('selected'));
        const idx=P.findIndex(p=>p.id===pid);
        if(idx>=0) openPersonCard(idx);
      }
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

// diagram上でドラッグ → 範囲選択
function initRangeSelect(){
  const dg=document.getElementById('diagram');
  let rect=null, sx, sy;
  dg.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target.closest('.card')||e.target.closest('.dfooter')||isPreviewActive())return;
    e.preventDefault();
    const dgRect=dg.getBoundingClientRect();
    sx=e.clientX-dgRect.left+dg.scrollLeft;
    sy=e.clientY-dgRect.top+dg.scrollTop;
    rect=document.createElement('div');
    rect.className='sel-rect';
    dg.appendChild(rect);

    function onMove(e2){
      const cx=e2.clientX-dgRect.left+dg.scrollLeft;
      const cy=e2.clientY-dgRect.top+dg.scrollTop;
      const x=Math.min(sx,cx), y=Math.min(sy,cy);
      const w=Math.abs(cx-sx), h=Math.abs(cy-sy);
      rect.style.left=x+'px';rect.style.top=y+'px';rect.style.width=w+'px';rect.style.height=h+'px';
    }
    function onUp(e2){
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      if(!rect)return;
      const cx=e2.clientX-dgRect.left+dg.scrollLeft;
      const cy=e2.clientY-dgRect.top+dg.scrollTop;
      const rx=Math.min(sx,cx), ry=Math.min(sy,cy);
      const rw=Math.abs(cx-sx), rh=Math.abs(cy-sy);
      rect.remove(); rect=null;

      // 範囲が小さすぎたら全解除
      if(rw<10&&rh<10){
        selectedIds.clear();
        document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
        document.querySelectorAll('.dhdr.selected').forEach(c=>c.classList.remove('selected'));
        document.querySelectorAll('.dfooter.selected').forEach(c=>c.classList.remove('selected'));
        return;
      }
      // 範囲内のカードを選択
      selectedIds.clear();
      document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
      if(currentCards){
        Object.entries(currentCards).forEach(([id,c])=>{
          const cardR=c.x, cardB=c.y;
          const cardR2=c.x+c.w, cardB2=c.y+c.h;
          if(cardR2>rx && cardR<rx+rw && cardB2>ry && cardB<ry+rh){
            selectedIds.add(+id);
            c.el.classList.add('selected');
          }
        });
      }
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

function mkCard(p,x,y){
  const d=document.createElement('div');
  d.className='card'+(p.role?' c-'+p.role:'');
  d.style.left=x+'px';d.style.top=y+'px';
  d.dataset.pid=p.id;
  const rl=ROLE_DISP[p.role]||p.role||'';
  const docs=DOCS[p.role]||[];
  let h=`<div class="card-h">立場: ${rl}</div><div class="card-b">`;
  if(p.relation)h+=`<div class="f"><span class="l">続柄</span><span class="v">${esc(p.relation)}</span></div>`;
  if(!p.isBSZ&&p.address){const ac=p.address.includes('\n')?'v-addr':'v';h+=`<div class="f"><span class="l">住所</span><span class="${ac}">${esc(p.address).replace(/\n/g,'\n')}</span></div>`;}
  h+=`<div class="f"><span class="l">氏名</span><span class="v">${esc(p.name)}</span></div>`;
  const bs=dateToStr(p,'birth');
  if(bs)h+=`<div class="f"><span class="l">出生</span><span class="v">${bs}</span></div>`;
  const ds=dateToStr(p,'death');
  if(ds)h+=`<div class="f"><span class="l">死亡</span><span class="v">${ds}</span></div>`;
  h+='</div>';
  if(showTags&&docs.length){h+='<div class="card-d">';docs.forEach(t=>h+=`<span class="tag">${t}</span>`);h+='</div>';}
  d.innerHTML=h;
  return d;
}

function drawLines(svg,cards,byId){
  const ns='http://www.w3.org/2000/svg';
  svg.innerHTML='';

  function has(id){return!!cards[id]&&cards[id].w>0}
  function cx(id){return Math.round(cards[id].x+cards[id].w/2)}
  function bot(id){return Math.round(cards[id].y+cards[id].h)}
  function tp(id){return Math.round(cards[id].y)}
  function rt(id){return Math.round(cards[id].x+cards[id].w)}
  function lt(id){return Math.round(cards[id].x)}
  function midY(id){return Math.round(cards[id].y+cards[id].h/2)}

  function mkLine(x1,y1,x2,y2,color,w){
    const l=document.createElementNS(ns,'line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',color||'#555');l.setAttribute('stroke-width',w||1.5);
    svg.appendChild(l);
  }

  // 1) 配偶者線（現配偶者=二重線、前配偶者=一本線）
  const spouseMid={};
  const drawnSp=new Set();
  function drawSpouseLine(pid,sid,isEx){
    if(!has(pid)||!has(sid))return;
    const key=Math.min(pid,sid)+'-'+Math.max(pid,sid);
    if(drawnSp.has(key))return;
    drawnSp.add(key);
    const color=isEx?'#888':'#c0392b';
    if(layoutDir==='horizontal'){
      const tid=tp(pid)<tp(sid)?pid:sid;
      const bid=tid===pid?sid:pid;
      const x=Math.round((cx(tid)+cx(bid))/2);
      const y1=bot(tid), y2=tp(bid);
      if(isEx){mkLine(x,y1,x,y2,color,2);}
      else{mkLine(x-3,y1,x-3,y2,color,2);mkLine(x+3,y1,x+3,y2,color,2);}
      spouseMid[key]={x:x, y:Math.round((y1+y2)/2)};
    } else {
      const lid=lt(pid)<lt(sid)?pid:sid;
      const rid=lid===pid?sid:pid;
      const y=Math.round((midY(lid)+midY(rid))/2);
      const x1=rt(lid), x2=lt(rid);
      if(isEx){mkLine(x1,y,x2,y,color,2);}
      else{mkLine(x1,y-3,x2,y-3,color,2);mkLine(x1,y+3,x2,y+3,color,2);}
      spouseMid[key]={x:Math.round((x1+x2)/2), y:y};
    }
  }
  P.forEach(p=>{
    if(p.spouse) drawSpouseLine(p.id,+p.spouse,false);
    (p.exSpouses||[]).forEach(eid=>{if(eid) drawSpouseLine(p.id,+eid,true);});
  });

  // 2) 親子線
  const drawnKids=new Set();
  const donePairs=new Set();

  P.forEach(p=>{
    if(!has(p.id))return;
    const fid=+p.father, mid=+p.mother;
    if(!fid&&!mid)return;

    let pairKey, anchorIds=[];
    if(fid&&mid&&has(fid)&&has(mid)){
      pairKey=Math.min(fid,mid)+'-'+Math.max(fid,mid);
      anchorIds=[fid,mid];
    } else if(fid&&has(fid)){
      pairKey='s-'+fid;
      anchorIds=[fid];
    } else if(mid&&has(mid)){
      pairKey='s-'+mid;
      anchorIds=[mid];
    } else return;

    if(donePairs.has(pairKey))return;
    donePairs.add(pairKey);

    const kids=P.filter(c=>{
      if(!has(c.id)||drawnKids.has(c.id))return false;
      const cf=+c.father, cm=+c.mother;
      if(anchorIds.length===2) return anchorIds.includes(cf)&&anchorIds.includes(cm);
      return cf===anchorIds[0]||cm===anchorIds[0];
    });
    if(!kids.length)return;
    kids.forEach(k=>drawnKids.add(k.id));

    // 起点
    let startX, startY;
    const spKey=anchorIds.length===2?Math.min(anchorIds[0],anchorIds[1])+'-'+Math.max(anchorIds[0],anchorIds[1]):null;

    if(layoutDir==='horizontal'){
      // 横モード: 親の右端→横線→分岐X→縦分岐→各子の左端へ横線
      if(spKey&&spouseMid[spKey]){
        startX=spouseMid[spKey].x+4;
        startY=spouseMid[spKey].y;
      } else {
        startX=rt(anchorIds[0]);
        startY=midY(anchorIds[0]);
      }
      const parentRt=Math.max(...anchorIds.map(id=>rt(id)));
      const minKidLt=Math.min(...kids.map(k=>lt(k.id)));
      const jx=Math.round(parentRt+(minKidLt-parentRt)/2);

      mkLine(startX,startY,jx,startY,'#555',1.5);

      const kidYs=kids.map(k=>midY(k.id)).sort((a,b)=>a-b);
      if(kids.length===1){
        const ky=midY(kids[0].id), kx=lt(kids[0].id);
        if(startY!==ky) mkLine(jx,startY,jx,ky,'#555',1.5);
        mkLine(jx,ky,kx,ky,'#555',1.5);
      } else {
        const ty=kidYs[0], by=kidYs[kidYs.length-1];
        if(startY<ty) mkLine(jx,startY,jx,ty,'#555',1.5);
        else if(startY>by) mkLine(jx,startY,jx,by,'#555',1.5);
        mkLine(jx,ty,jx,by,'#555',1.5);
        kids.forEach(k=>{
          const ky=midY(k.id), kx=lt(k.id);
          mkLine(jx,ky,kx,ky,'#555',1.5);
        });
      }
    } else {
      // 縦モード: 既存ロジック
      if(spKey&&spouseMid[spKey]){
        startX=spouseMid[spKey].x;
        startY=spouseMid[spKey].y+4;
      } else {
        startX=cx(anchorIds[0]);
        startY=bot(anchorIds[0]);
      }

      const parentBot=Math.max(...anchorIds.map(id=>bot(id)));
      const minKidTop=Math.min(...kids.map(k=>tp(k.id)));
      const jy=Math.round(parentBot+(minKidTop-parentBot)/2);

      mkLine(startX,startY,startX,jy,'#555',1.5);

      const kidXs=kids.map(k=>cx(k.id)).sort((a,b)=>a-b);
      if(kids.length===1){
        const kx=cx(kids[0].id), ky=tp(kids[0].id);
        if(startX!==kx) mkLine(startX,jy,kx,jy,'#555',1.5);
        mkLine(kx,jy,kx,ky,'#555',1.5);
      } else {
        const lx=kidXs[0], rx=kidXs[kidXs.length-1];
        if(startX<lx) mkLine(startX,jy,lx,jy,'#555',1.5);
        else if(startX>rx) mkLine(startX,jy,rx,jy,'#555',1.5);
        mkLine(lx,jy,rx,jy,'#555',1.5);
        kids.forEach(k=>{
          const kx=cx(k.id), ky=tp(k.id);
          mkLine(kx,jy,kx,ky,'#555',1.5);
        });
      }
    }
  });
}

let pvOffX=0, pvOffY=0, pvDragActive=false;

function isPreviewActive(){
  const o=document.getElementById('previewOverlay');
  return o&&o.classList.contains('active');
}

function togglePreview(){
  let overlay=document.getElementById('previewOverlay');

  if(overlay && overlay.classList.contains('active')){
    // プレビュー終了 — diagramを元に戻す
    overlay.classList.remove('active');
    const dg=document.getElementById('diagram');
    const main=document.querySelector('.main');
    main.appendChild(dg);
    dg.style.transform='';
    dg.classList.remove('grabbing');
  } else {
    // プレビュー開始 — diagramをA4枠に移動
    if(!overlay){
      overlay=document.createElement('div');
      overlay.id='previewOverlay';
      overlay.className='preview-overlay';
      overlay.innerHTML=`
        <div class="preview-a4" id="pvA4"></div>
        <div class="preview-ctrl">
          <button class="pv-btn-back" onclick="togglePreview()">戻る</button>
          <span id="pvScaleVal">${previewScale}%</span>
          <span style="color:#999;font-size:11px">（スクロールで拡大縮小 / ドラッグで移動）</span>
          <button class="pv-btn-print" onclick="window.print()">印刷</button>
        </div>
      `;
      document.body.appendChild(overlay);
      initPvDrag();
      initPvWheel();
    }
    const a4=document.getElementById('pvA4');
    const dg=document.getElementById('diagram');
    a4.appendChild(dg);
    overlay.classList.add('active');
    applyPvTransform();
  }
}

function setPvScale(v){
  previewScale=Math.max(5,Math.min(200,+v));
  const el=document.getElementById('pvScaleVal');
  if(el) el.textContent=Math.round(previewScale)+'%';
  applyPvTransform();
}

function initPvWheel(){
  document.addEventListener('wheel',e=>{
    if(!isPreviewActive())return;
    e.preventDefault();
    const delta=e.deltaY>0?-3:3;
    setPvScale(previewScale+delta);
  },{passive:false});
}

function applyPvTransform(){
  const dg=document.getElementById('diagram');
  if(!dg)return;
  const s=previewScale/100;
  dg.style.transform=`translate(${pvOffX}px,${pvOffY}px) scale(${s})`;
}

function initPvDrag(){
  let sx, sy, ox, oy;
  document.addEventListener('mousedown',e=>{
    const a4=document.getElementById('pvA4');
    if(!a4||!a4.contains(e.target))return;
    if(e.button!==0)return;
    e.preventDefault();
    pvDragActive=true;
    sx=e.clientX; sy=e.clientY;
    ox=pvOffX; oy=pvOffY;
    document.getElementById('diagram').classList.add('grabbing');
  });
  document.addEventListener('mousemove',e=>{
    if(!pvDragActive)return;
    pvOffX=ox+(e.clientX-sx);
    pvOffY=oy+(e.clientY-sy);
    applyPvTransform();
  });
  document.addEventListener('mouseup',()=>{
    if(!pvDragActive)return;
    pvDragActive=false;
    const dg=document.getElementById('diagram');
    if(dg) dg.classList.remove('grabbing');
  });
}

      let inputs='';
      nps.forEach((n,j)=>{inputs+='<div class="fg" style="margin-bottom:8px"><label style="font-size:12px;color:#7f8c8d;font-weight:600">甥姪'+(j+1)+'のお名前</label><input class="wiz-input" id="wizNP'+j+'" placeholder="お名前" value="'+esc(n.name||'')+'"></div>';});

          if(c.grandchildren&&c.grandchildren.length)st+=' → 代襲'+c.grandchildren.length+'人';
          if(c.suujiSpouse)st+=' → 数次:配偶者あり';
          if(c.suujiChildren&&c.suujiChildren.length)st+=' → 数次:子'+c.suujiChildren.length+'人';
          sm.push('  └ '+(c.relation||'子'+(i+1))+'：'+(c.name||'(未入力)')+'　'+st);

      if(d.exSpouse)sm.push('前配偶者：'+(d.exSpouse.name||'(未入力)')+'　'+(d.exSpouse.alive?'存命':'死亡'));
      if(d.exChildren.length){sm.push('前婚の子：'+d.exChildren.length+'人');d.exChildren.forEach((c,i)=>sm.push('  └ '+(c.name||'(未入力)')));}

        d.siblings.forEach((sb,i)=>{

      } else {

      }
