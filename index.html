<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>相続関係説明図</title>
<link rel="stylesheet" href="design/tokens.css"/>
<link rel="stylesheet" href="design/app.css"/>
<link rel="stylesheet" href="design/app-client.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  html, body, #root { height:100%; width:100%; overflow:hidden; margin:0; }
  /* minor additions on top of design CSS */
  .side__form .inp { margin-bottom: 4px; }
  .pr__sub .pr__death { color: var(--role-post); }
  .canvas-scroll { cursor: default; }
  .diagram-paper { cursor: default; }
  .dcard { user-select: none; }
  .dcard.dragging { opacity: 0.9; cursor: grabbing; box-shadow: 0 8px 24px rgba(20,17,14,.18); z-index:50; }
  .sel-rect { position:absolute; border:1.5px dashed var(--brand-700); background:rgba(51,74,102,.08); z-index:40; pointer-events:none; }
  .inp-text, .inp-select, .inp-area { width:100%; height:30px; padding:0 10px; border:1px solid var(--ink-200); border-radius:var(--r-md); font-size:13px; color:var(--ink-800); background:var(--white); font-family:inherit; box-sizing:border-box; }
  .inp-area { height:auto; padding:8px 10px; resize:vertical; min-height:48px; }
  .inp-text:focus, .inp-select:focus, .inp-area:focus { outline:none; border-color:var(--brand-700); box-shadow:0 0 0 3px rgba(51,74,102,.1); }
  .side__form label.lbl { display:block; }
  .pd__row .field > input.inp-text, .pd__row .field > select.inp-select { font-size:12.5px; }
  /* Preview overlay */
  .pv-overlay { position:fixed; inset:0; background:rgba(20,17,14,.72); z-index:200; display:flex; flex-direction:column; align-items:center; overflow:auto; }
  .pv-a4 { position:relative; background:var(--paper); width:210mm; height:297mm; margin:20px auto 80px; box-shadow:0 20px 48px rgba(0,0,0,.4); overflow:hidden; flex-shrink:0; }
  .pv-a4 .diagram-paper { position:absolute; top:0; left:0; transform-origin:0 0; }
  .pv-ctrl { position:fixed; bottom:0; left:0; right:0; background:var(--ink-900); color:var(--ink-100); padding:12px 20px; display:flex; align-items:center; gap:14px; justify-content:center; z-index:201; }
  .pv-ctrl button { background:var(--ink-100); color:var(--ink-900); border:none; border-radius:6px; padding:8px 18px; font-weight:600; cursor:pointer; font-family:inherit; font-size:13px; }
  .pv-ctrl button.primary { background:var(--brand-700); color:#fff; }
  .pv-ctrl button:hover { opacity:.9; }
  .pv-ctrl .pv-val { min-width:52px; text-align:center; font-variant-numeric:tabular-nums; font-weight:600; }
  /* Modal backdrop (wizard / share / import) */
  .modal-back { position:fixed; inset:0; background:rgba(20,17,14,.55); z-index:300; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal-card { background:var(--white); border-radius:14px; width:540px; max-width:95vw; max-height:90vh; overflow:auto; box-shadow:0 20px 48px rgba(20,17,14,.18),0 4px 12px rgba(20,17,14,.08); }
  .modal-hd { padding:16px 22px; display:flex; justify-content:space-between; align-items:center; background:var(--ink-900); color:var(--ink-100); border-radius:14px 14px 0 0; }
  .modal-hd h3 { margin:0; font-size:15px; font-weight:600; letter-spacing:.04em; }
  .modal-hd button { background:transparent; color:rgba(255,255,255,.6); border:none; font-size:18px; cursor:pointer; }
  .modal-hd button:hover { color:#fff; }
  .modal-bd { padding:22px; }
  .modal-ft { padding:14px 22px; border-top:1px solid var(--ink-200); display:flex; justify-content:flex-end; gap:8px; }
  .progress { height:3px; background:var(--ink-200); }
  .progress-bar { height:3px; background:var(--brand-700); transition:width .3s; }
  .q-title { font-size:15px; font-weight:600; color:var(--ink-900); margin-bottom:6px; line-height:1.6; }
  .q-hint { font-size:12px; color:var(--ink-600); margin-bottom:16px; line-height:1.5; }
  .q-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .q-btn { padding:10px 22px; border-radius:8px; border:1px solid var(--ink-200); background:var(--white); color:var(--ink-800); font-weight:500; font-size:13px; cursor:pointer; font-family:inherit; transition:all .12s; text-align:left; }
  .q-btn:hover { border-color:var(--brand-700); background:#f0f4f8; color:var(--brand-900); }
  .q-btn.primary { background:var(--brand-800); color:var(--ink-100); border-color:var(--brand-800); font-weight:600; }
  .q-btn.primary:hover { background:var(--brand-900); color:#fff; }
  .q-multi { display:flex; flex-direction:column; gap:8px; }
  .q-multi .q-btn { line-height:1.5; }
  .q-multi .q-sub { font-size:11px; color:var(--ink-600); margin-top:2px; font-weight:400; }
  .q-tag { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; font-weight:600; margin-bottom:8px; letter-spacing:.04em; background:#dde7ef; color:var(--brand-800); }
  .q-summary { background:var(--ink-50); border:1px solid var(--ink-200); border-radius:8px; padding:14px; font-size:13px; line-height:2; white-space:pre-line; margin-bottom:16px; color:var(--ink-800); }
  .share-fab { position:fixed; bottom:16px; right:16px; z-index:150; padding:10px 18px; border-radius:10px; background:var(--role-heir); color:#fff; border:none; font-weight:600; font-size:13px; cursor:pointer; box-shadow:0 4px 16px rgba(20,17,14,.2); font-family:inherit; letter-spacing:.02em; }
  .share-fab:hover { background:#305943; }
  .client-banner { background:var(--ink-50); border:1px solid var(--ink-200); border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:12px; color:var(--ink-800); line-height:1.6; border-left:4px solid var(--brand-700); }
  .code-area { width:100%; min-height:80px; padding:10px; border:1px solid var(--ink-200); border-radius:8px; font-family:'JetBrains Mono',ui-monospace,monospace; font-size:11px; word-break:break-all; resize:none; box-sizing:border-box; margin-bottom:12px; background:var(--white); color:var(--ink-800); }
  .copy-btn { padding:12px 24px; border-radius:8px; border:none; background:var(--brand-800); color:var(--ink-100); font-weight:600; font-size:14px; cursor:pointer; width:100%; transition:all .15s; font-family:inherit; }
  .copy-btn:hover { background:var(--brand-900); color:#fff; }
  .copy-btn.done { background:var(--role-heir)!important; color:#fff; }
  /* Client mode full-screen wizard */
  body.client-mode .top-bar, body.client-mode .app-body, body.client-mode .share-fab { display:none !important; }
  body.client-mode .modal-back { background:linear-gradient(135deg,#f5f7fa,#e4e9f0); }
  body.client-mode .modal-card { width:720px; }
  body.client-mode .modal-bd { padding:32px; }
  /* Print */
  @page { size:A4; margin:0; }
  @media print {
    html, body, #root { overflow:visible !important; height:auto !important; }
    .top-bar, .app-body, .share-fab, .pv-ctrl, .modal-back { display:none !important; }
    .pv-overlay { position:static !important; background:#fff !important; padding:0 !important; margin:0 !important; overflow:visible !important; }
    .pv-a4 { box-shadow:none !important; margin:0 !important; width:210mm !important; height:297mm !important; page-break-after:avoid; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel" src="design/components/icons.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="app-layout.jsx"></script>
  <script type="text/babel" src="app-components.jsx"></script>
  <script type="text/babel" src="app-diagram.jsx"></script>
  <script type="text/babel" src="app-modals.jsx"></script>
  <script type="text/babel" src="app-main.jsx"></script>
</body>
</html>
